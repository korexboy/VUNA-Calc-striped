<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUNA Calculator</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .area-dropdown {
      width: 100%;
      padding: 12px 15px;
      font-size: 1rem;
      font-weight: 600;
      border: 2px solid #667eea;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      text-align: center;
      text-align-last: center;
    }
    .area-dropdown:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
    }
    .area-dropdown option {
      background: white;
      color: #333;
      font-weight: normal;
    }
    .area-dropdown option:first-child {
      color: #999;
    }

    /* Area input panel */
    .area-panel {
      display: none;
      background: #f8f9fa;
      border: 2px solid #667eea;
      border-radius: 8px;
      padding: 15px;
      margin-top: 10px;
      grid-column: span 4;
    }
    .area-panel.active {
      display: block;
    }
    .area-panel h5 {
      color: #667eea;
      margin-bottom: 10px;
      text-align: center;
      font-size: 0.95rem;
    }
    .area-input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .area-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      text-align: center;
    }
    .area-input:focus {
      outline: none;
      border-color: #667eea;
    }
    .area-btn {
      width: 100%;
      padding: 10px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    .area-btn:hover {
      background: #5a6fd6;
    }
    .area-cancel {
      width: 100%;
      padding: 8px;
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 8px;
      cursor: pointer;
    }
    .area-cancel:hover {
      background: #5a6268;
    }
  </style>
<base target="_blank">
</head>

<body>
  <!-- Theme Toggle Button -->
  <button class="btn btn-outline-secondary theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()"
    title="Toggle dark/light mode">
    🌙
  </button>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-6 col-sm-8">
        <div class="border border-dotted border-3 rounded-3 p-3 mb-4 bg-white bg-opacity-50">
          <h4 class="text-center group-header mb-0">VUNA CALCULATOR</h4>
          <p class="text-center text-small text-muted">
            <i>Created by Set 2025/26 Software Engineering</i>
          </p>
        </div>
        <div class="row">
          <div class="col-md-12">
            <div class="card calculator-card">
              <div class="card-body p-4">
                <div class="calculator">
                  <div class="display-container">
                    <input type="text" class="form-control" id="result" placeholder="0" disabled />
                  </div>

                  <div class="btn-grid">
                    <!-- Row 1: AC, CE (backspace) -->
                    <button class="btn btn-action" onclick="clearResult()">AC</button>
                    <button class="btn btn-action" onclick="backspace()">CE</button>

                    <!-- Row 2: 7 8 9 ÷ -->
                    <button class="btn btn-light" onclick="appendToResult(7)">7</button>
                    <button class="btn btn-light" onclick="appendToResult(8)">8</button>
                    <button class="btn btn-light" onclick="appendToResult(9)">9</button>
                    <button class="btn btn-operator" onclick="operatorToResult('/')">÷</button>

                    <!-- Row 3: 4 5 6 × -->
                    <button class="btn btn-light" onclick="appendToResult(4)">4</button>
                    <button class="btn btn-light" onclick="appendToResult(5)">5</button>
                    <button class="btn btn-light" onclick="appendToResult(6)">6</button>
                    <button class="btn btn-operator" onclick="operatorToResult('*')">×</button>

                    <!-- Row 4: 1 2 3 - -->
                    <button class="btn btn-light" onclick="appendToResult(1)">1</button>
                    <button class="btn btn-light" onclick="appendToResult(2)">2</button>
                    <button class="btn btn-light" onclick="appendToResult(3)">3</button>
                    <button class="btn btn-operator" onclick="operatorToResult('-')">−</button>

                    <!-- Row 5: . 0 = + -->
                    <button class="btn btn-light" onclick="appendToResult('.')">.</button>
                    <button class="btn btn-light" onclick="appendToResult(0)">0</button>
                    <button class="btn btn-equals" onclick="calculateResult()">=</button>
                    <button class="btn btn-operator" onclick="operatorToResult('+')">+</button>

                    <!-- Row 6: AREA DROPDOWN -->
                    <select id="area-dropdown" class="area-dropdown" style="grid-column: span 4;" onchange="handleAreaSelect(this.value)">
                      <option value="" selected disabled>📐 Calculate Area...</option>
                      <option value="square">⬜ Area of Square (s²)</option>
                      <option value="rectangle">▭ Area of Rectangle (l × w)</option>
                      <option value="circle">🔵 Area of Circle (πr²)</option>
                    </select>

                    <!-- Square Input Panel -->
                    <div id="panel-square" class="area-panel">
                      <h5>⬜ Area of Square</h5>
                      <div class="area-input-group">
                        <input type="number" id="square-side" class="area-input" placeholder="Side length" step="any" />
                      </div>
                      <button class="area-btn" onclick="calculateSquare()">Calculate</button>
                      <button class="area-cancel" onclick="hideAreaPanel()">Cancel</button>
                    </div>

                    <!-- Rectangle Input Panel -->
                    <div id="panel-rectangle" class="area-panel">
                      <h5>▭ Area of Rectangle</h5>
                      <div class="area-input-group">
                        <input type="number" id="rect-length" class="area-input" placeholder="Length" step="any" />
                        <input type="number" id="rect-width" class="area-input" placeholder="Width" step="any" />
                      </div>
                      <button class="area-btn" onclick="calculateRectangle()">Calculate</button>
                      <button class="area-cancel" onclick="hideAreaPanel()">Cancel</button>
                    </div>

                    <!-- Circle Input Panel -->
                    <div id="panel-circle" class="area-panel">
                      <h5>🔵 Area of Circle</h5>
                      <div class="area-input-group">
                        <input type="number" id="circle-radius" class="area-input" placeholder="Radius" step="any" />
                      </div>
                      <button class="area-btn" onclick="calculateCircle()">Calculate</button>
                      <button class="area-cancel" onclick="hideAreaPanel()">Cancel</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/bootstrap.min.js"></script>
  <!-- Load the pure math engine FIRST -->
  <script src="src/calculator.js"></script>
  <!-- Then load the DOM wiring -->
  <script src="assets/js/script.js"></script>
</body>

</html>
